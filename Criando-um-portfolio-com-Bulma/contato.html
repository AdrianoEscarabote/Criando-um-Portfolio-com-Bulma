<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/js/all.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.3/css/bulma.min.css">
  <title>Contato com Adriano</title>
  <style>
    div.column.is-9 {
      margin-top: 2.7%;
    }
    .navbar {
      margin-bottom: 40px;
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-brand is active">
        <a class="navbar-item" href="index.html">
          <img src="https://bulma.io/images/bulma-logo.png"
            alt="Bulma: Free, open source, and modern CSS framework based on Flexbox" width="112" height="28">
        </a>
        <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>
      <a class="navbar-item" href="index.html">
        Início
      </a>
      <a class="navbar-item" href="contato.html">
        Contato
      </a>
    </nav>
  </header>
  <!--até aqui ta suave-->
  <div class="columns">
    <div class="column">
      <section class="section">
        <div class="container">
          <div class="card">
            <div class="card-image">
              <figure class="image is-4by3">
                <img src="https://bulma.io/images/placeholders/1280x960.png" alt="Placeholder image">
              </figure>
            </div>
            <div class="card-content">
              <div class="media">
                <div class="media-content">
                  <p class="title is-4">John Smith</p><br>
                  <span class="tag is-dark is-medium">Javascript Full Stack Developer</span><br>
                </div>
              </div>
              <div class="content">
                <p>
                  (00)65410-1234
                </p>
                <br>
                <p>john@gmail.com</p>
              </div>
            </div>
          </div>
        </div>
    </div>
    <!--até aqui ta suave-->
    <div class="column is-9">
      <div class="card">
        <header class="card-header">
          <p class="card-header-title">
            Contato
          </p>
        </header>
        <div class="card-content">
          <div class="content">
            <div class="field">
              <label class="label">Email</label>
              <div class="control">
                <input class="input" type="email" placeholder="Digite seu email">
              </div>
            </div>
            <label for="textarea"><span class="title is-6">Mensagem</span></label>
            <textarea class="textarea" placeholder="Digite sua mensagem"></textarea>
            <div class="control">
              <br>
              <button class="button is-primary">Enviar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
</body>

</html>
